<tr id="training-{{ training.pk }}-form">
    <td colspan="6">
        <form hx-post="{% url 'team:training_edit_inline' training.pk %}" 
              hx-target="#training-{{ training.pk }}-form"
              hx-swap="outerHTML"
              class="flex flex-wrap items-center gap-2 p-2 bg-base-100 rounded">
            {% csrf_token %}
            <div class="min-w-[100px]">
                <label for="{{ form.day_of_week.id_for_label }}" class="sr-only">Gün</label>
                {{ form.day_of_week }}
            </div>
            <div class="w-20">
                <label for="{{ form.time.id_for_label }}" class="sr-only">Saat</label>
                {{ form.time }}
            </div>
            <div class="w-20">
                <label for="{{ form.end_time.id_for_label }}" class="sr-only">Bitiş</label>
                {{ form.end_time }}
            </div>
            <div class="min-w-[120px]">
                <label for="{{ form.team.id_for_label }}" class="sr-only">Takım</label>
                {{ form.team }}
            </div>
            <div class="min-w-[140px]">
                <label for="{{ form.location.id_for_label }}" class="sr-only">Lokasyon</label>
                {{ form.location }}
            </div>
            <div class="min-w-[140px]">
                <label for="{{ form.trainer.id_for_label }}" class="sr-only">Antrenör</label>
                {{ form.trainer }}
            </div>
            <div class="flex-1 min-w-[160px]">
                <label for="{{ form.notes.id_for_label }}" class="sr-only">Notlar</label>
                {{ form.notes }}
            </div>
            <button type="submit" class="bg-success hover:bg-success text-white px-3 py-1 rounded text-xs border-0 cursor-pointer whitespace-nowrap flex-shrink-0 inline-flex items-center gap-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> Kaydet
            </button>
            <button type="button" 
                    hx-get="{% url 'team:training_view_inline' training.pk %}"
                    hx-target="#training-{{ training.pk }}-form"
                    hx-swap="outerHTML"
                    class="bg-base-300 hover:bg-base-300 text-white px-3 py-1 rounded text-xs border-0 cursor-pointer whitespace-nowrap flex-shrink-0 inline-flex items-center gap-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg> İptal
            </button>
            {% if form.non_field_errors %}
            <div class="text-error text-xs">
                {{ form.non_field_errors }}
            </div>
            {% endif %}
        </form>
    </td>
</tr>
