{% load team_filters %}
<div class="list-group-item border-0 px-4 py-4 htmx-settling rounded-lg {% with colors=training.team.name|team_color_dict %}{{ colors.bg }} border-l-4 {{ colors.border }}{% endwith %} shadow-sm hover:shadow-md transition-all duration-200" id="training-card-{{ training.pk }}">
    <div class="d-flex justify-content-between align-items-start">
        <div class="flex-grow-1">
            <h6 class="mb-1">
                <span class="badge {% with colors=training.team.name|team_color_dict %}{{ colors.badge }}{% endwith %} text-white font-semibold text-sm">{{ training.time|time:"H:i" }}{% if training.end_time %} - {{ training.end_time|time:"H:i" }}{% endif %}</span>
            </h6>
            <p class="mb-1">
                <strong class="{% with colors=training.team.name|team_color_dict %}{{ colors.text }}{% endwith %} text-lg font-bold">{{ training.team.name }}</strong>
            </p>
            <small class="text-muted inline-flex items-center gap-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg> {{ training.location }}
            </small>
            {% if training.trainer %}
            <small class="text-muted inline-flex items-center gap-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.121 17.804A7 7 0 0112 15a7 7 0 016.879 2.804M15 11a3 3 0 10-6 0 3 3 0 006 0z"></path></svg> {{ training.trainer }}
            </small>
            {% endif %}
            {% if training.notes %}
            <p class="mt-2 mb-0 small text-muted">{{ training.notes }}</p>
            {% endif %}
        </div>
        <div class="ms-2">
            <button 
                type="button"
                class="btn btn-sm btn-outline-primary"
                hx-get="{% url 'team:training_edit_inline' training.pk %}"
                hx-target="#training-card-{{ training.pk }}"
                hx-swap="outerHTML"
                title="Düzenle">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
            </button>
            <button 
                type="button"
                class="btn btn-sm btn-outline-danger"
                hx-get="{% url 'team:training_delete_inline' training.pk %}"
                hx-target="#training-card-{{ training.pk }}"
                hx-swap="outerHTML swap:1s"
                hx-confirm="Bu antrenmanı silmek istediğinizden emin misiniz?"
                title="Sil">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
            </button>
        </div>
    </div>
</div>
