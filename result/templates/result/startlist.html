{% extends 'user/base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<!-- name of each tab group should be unique -->

<div class="container mx-auto">
  <form class="filter">
    <input class="btn btn-square" type="reset" value="×"/>
    {% for event in events %}
    <input class="btn" type="radio" name="frameworks" aria-label="{{ event.event_title|wordwrap:3 }}"/>
    {% endfor %}

  </form>
</div>


<!-- sporcu ve kulüp ara -->
<div class="join m-4 flex flex-col md:grid md:grid-cols-2 gap-2">
    <!-- kulüp ara -->
    <div >
      
        <input type="text" 
              minlength="3" 
              required 
              hx-validate="true"
              name="club_search" 
              placeholder="Kulüp Adı..." 
              hx-get="{% url 'result:htmx_club_list' %}" 
              hx-trigger="keyup changed delay:500ms"
              hx-target="#club-results"
              label="Kulüp Ara..."
              class="input input-bordered w-full"
              >
        
        <div id="club-results">
          
            <!-- Results will appear here -->
        </div>

    
    </div>
    <!-- sporcu ara -->
    <div id="swimmer-search">
        <input type="search" 
              name="swimmer_search" 
              minlength="3" 
              required 
              hx-validate="true"
              placeholder="Sporcu Adı..." 
              hx-get="{% url 'result:htmx_swimmer_list' %}" 
              hx-trigger="keyup changed delay:500ms" 
              hx-target="#swimmer-results"
              label="Sporcu Ara..."
              class="input input-bordered w-full">

        <div id="swimmer-results">
            <!-- Results will appear here -->
        </div>
    </div>
</div>
  <form id="result-form" 
        hx-get="{% url 'result:htmx_result_list' %}" 
        hx-trigger="click" 
        hx-target="#result-list">
  <input id="club-search-input" type="text" hidden name="club_search" >
  <input id="swimmer-search-input" type="text" hidden name="swimmer_search" >
  <input id="event-search-input" type="text" hidden name="event_search" >
  <button class="btn" type="submit">ara</button>

</form>

<div  id="result-list">

</div>






<script>
  function clubInputHandler(club_name) {
    const clubSearchInput = document.getElementById('club-search-input');
    clubSearchInput.value=null
    clubSearchInput.value = club_name;
  }
  function swimmerInputHandler(swimmer_name) {
    const swimmerSearchInput = document.getElementById('swimmer-search-input');
    swimmerSearchInput.value=null
    swimmerSearchInput.value = swimmer_name;  
  }
  function eventInputHandler(event_name) {
    const eventSearchInput = document.getElementById('event-search-input');
    eventSearchInput.value=null
    eventSearchInput.value = event_name;  
  }
  
</script>



<div id="results"></div>

{% endblock %}
