<div class="filter grid grid-cols-[30px_1fr] ">
  <input class="btn filter-reset" type="radio" name="club_list" aria-label="×"/>
  <div>
  {% for club in clubs %}
    <input class="btn hover:bg-amber-200" type="radio" 
    name="club_list" 
    aria-label="{{ club.club_raw }}"
    hx-get="{% url 'result:htmx_result_list' %}?club_search={{ club.club_raw|urlencode }}"
    hx-trigger="click"
    hx-target="#result-list"/>
    {% endfor %}
   
</div>
</div>
